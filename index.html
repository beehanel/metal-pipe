<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horse Pipe</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    img {
      max-width: 80vw;
      max-height: 80vh;
      cursor: pointer;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      transition: transform 0.1s ease;
    }

    img:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  click the horse
  <img id="horse" src="horse.jpg" alt="Horse" />
  <audio id="pipeSound" src="metal-pipe.mp3"></audio>

  <script>
    const horse = document.getElementById("horse");
    const pipeSound = document.getElementById("pipeSound");

    horse.addEventListener("click", () => {
      pipeSound.currentTime = 0;
      pipeSound.play();
    });
  </script>
</body>
</html>
